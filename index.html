<!DOCTYPE html>
<html>
<head>
<title>Aging Calculator</title>
<style>
body {
font-family: Arial;
padding: 20px;
max-width: 700px;
margin: auto;
}

button, select {
padding: 10px;
margin-top: 10px;
font-size: 16px;
}

#output {
margin-top: 25px;
font-size: 18px;
line-height: 1.8;
}

.label {
font-weight: bold;
}
</style>
</head>
<body>

<h2>Business Day Aging Calculator</h2>

<label>Select Schedule:</label><br>
<select id="schedule">
<option value="monfri">Mon–Fri</option>
<option value="tuesat">Tue–Sat</option>
</select>

<br>
<button onclick="calculateAging()">Generate</button>

<div id="output"></div>

<script>

function isBusinessDay(date, schedule) {
const day = date.getDay();

if (schedule === "monfri") {
return day !== 0 && day !== 6; // Sun & Sat off
}

if (schedule === "tuesat") {
return day !== 0 && day !== 1; // Sun & Mon off
}

return false;
}

function formatDate(date) {
return `${date.getMonth() + 1}/${date.getDate()}`;
}

function getPreviousBusinessDays(startDate, count, schedule) {
const days = [];
const current = new Date(startDate);

while (days.length < count) {
if (isBusinessDay(current, schedule)) {
days.push(new Date(current));
}
current.setDate(current.getDate() - 1);
}

return days;
}

function calculateAging() {
const schedule = document.getElementById("schedule").value;

const today = new Date();
today.setHours(12, 0, 0, 0);

const days = getPreviousBusinessDays(today, 11, schedule);

const outputHtml = `
<div><span class="label">Today:</span> ${formatDate(today)}</div>
<div><span class="label">Schedule:</span> ${schedule === "monfri" ? "Mon–Fri" : "Tue–Sat"}</div>
<br>
<div><span class="label">0-1 days old:</span> ${formatDate(days[1])} to ${formatDate(days[0])}</div>
<div><span class="label">2-5 days old:</span> ${formatDate(days[5])} to ${formatDate(days[2])}</div>
<div><span class="label">6-10 days old:</span> ${formatDate(days[10])} to ${formatDate(days[6])}</div>
<div><span class="label">Over 10 days old:</span> Before ${formatDate(days[10])}</div>
`;

document.getElementById("output").innerHTML = outputHtml;
}

</script>

</body>
</html>
