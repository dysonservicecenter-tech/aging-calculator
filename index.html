<!DOCTYPE html>
<html>
<head>
<title>Business Day Aging Calculator</title>
<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  max-width: 800px;
  margin: auto;
}
h2 {
  margin-bottom: 10px;
}
button, select {
  padding: 10px 14px;
  margin-top: 10px;
  margin-right: 10px;
  font-size: 16px;
  cursor: pointer;
}
#output {
  margin-top: 25px;
  font-size: 18px;
  line-height: 1.9;
}
.label {
  font-weight: bold;
}
#printWorksheet {
  margin-top: 35px;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}
th, td {
  border: 1px solid #000;
  padding: 10px 10px 18px 10px;   /* Wider bottom padding for easier handwriting */
  text-align: left;
  font-size: 16px;
  height: 70px;                   /* Taller rows */
}
th {
  background-color: #f2f2f2;
}
.bucket-col { width: 90px; }
.date-range-col { width: 130px; }
.status-col { width: 65px; text-align: center; }
.total-aging-col { width: 75px; text-align: center; font-weight: bold; background: #f9f9f9;}
.total-queue-label { text-align: right; font-weight: bold; background: #f9f9f9;}
.total-queue-cell { background: #f0f0f0; font-weight: bold; }
@media print {
  button, select, label {
    display: none !important;
  }
  body {
    padding: 0;
    max-width: 100%;
  }
  table, th, td {
    font-size: 15px;
  }
}
</style>
</head>
<body>
<h2>Business Day Aging Calculator</h2>
<label for="schedule">Select Schedule:</label><br>
<select id="schedule">
  <option value="monfri">Mon-Fri</option>
  <option value="tuesat">Tue-Sat</option>
</select>
<br>
<button onclick="calculateAging()">Generate</button>
<button onclick="window.print()">Print</button>
<div id="output"></div>
<div id="printWorksheet"></div>
<script>
function isBusinessDay(date, schedule) {
  const day = date.getDay();
  if (schedule === "monfri") {
    return day !== 0 && day !== 6;
  }
  if (schedule === "tuesat") {
    return day !== 0 && day !== 1;
  }
  return false;
}
function formatDate(date) {
  return `${date.getMonth() + 1}/${date.getDate()}`;
}
function getPreviousBusinessDays(startDate, count, schedule) {
  const days = [];
  const current = new Date(startDate);
  current.setHours(12, 0, 0, 0);
  while (days.length < count) {
    if (isBusinessDay(current, schedule)) {
      days.push(new Date(current));
    }
    current.setDate(current.getDate() - 1);
  }
  return days;
}
function getAgingData() {
  const schedule = document.getElementById("schedule").value;
  const today = new Date();
  today.setHours(12, 0, 0, 0);
  const days = getPreviousBusinessDays(today, 11, schedule);
  return {
    today: formatDate(today),
    scheduleLabel: schedule === "monfri" ? "Mon-Fri" : "Tue-Sat",
    range01: `${formatDate(days[1])} to ${formatDate(days[0])}`,
    range25: `${formatDate(days[5])} to ${formatDate(days[2])}`,
    range610: `${formatDate(days[10])} to ${formatDate(days[6])}`,
    over10: `Before ${formatDate(days[10])}`
  };
}
function calculateAging() {
  const data = getAgingData();
  document.getElementById("output").innerHTML = `
    <div><span class="label">Today:</span> ${data.today}</div>
    <div><span class="label">Schedule:</span> ${data.scheduleLabel}</div>
    <br>
    <div><span class="label">0-1 days old:</span> ${data.range01}</div>
    <div><span class="label">2-5 days old:</span> ${data.range25}</div>
    <div><span class="label">6-10 days old:</span> ${data.range610}</div>
    <div><span class="label">Over 10 days old:</span> ${data.over10}</div>
  `;

  document.getElementById("printWorksheet").innerHTML = `
    <h2>Business Day Aging Worksheet</h2>
    <div><strong>Today:</strong> ${data.today}</div>
    <div><strong>Schedule:</strong> ${data.scheduleLabel}</div>
    <table>
      <tr>
        <th class="bucket-col">Bucket</th>
        <th class="date-range-col">Date Range</th>
        <th class="status-col">Walk-in Queue</th>
        <th class="status-col">Shipped to Queue</th>
        <th class="status-col">Waiting on Customer</th>
        <th class="status-col">Waiting on Parts</th>
        <th class="total-aging-col">Total Aging</th>
      </tr>
      <tr>
        <td class="bucket-col">0–1 day</td>
        <td class="date-range-col">${data.range01}</td>
        <td class="status-col"></td>
        <td class="status-col"></td>
        <td class="status-col"></td>
        <td class="status-col"></td>
        <td class="total-aging-col"></td>
      </tr>
      <tr>
        <td class="bucket-col">2–5 days</td>
        <td class="date-range-col">${data.range25}</td>
        <td class="status-col"></td>
        <td class="status-col"></td>
        <td class="status-col"></td>
        <td class="status-col"></td>
        <td class="total-aging-col"></td>
      </tr>
      <tr>
        <td class="bucket-col">6–10 days</td>
        <td class="date-range-col">${data.range610}</td>
        <td class="status-col"></td>
        <td class="status-col"></td>
        <td class="status-col"></td>
        <td class="status-col"></td>
        <td class="total-aging-col"></td>
      </tr>
      <tr>
        <td class="bucket-col">Over 10 days</td>
        <td class="date-range-col">${data.over10}</td>
        <td class="status-col"></td>
        <td class="status-col"></td>
        <td class="status-col"></td>
        <td class="status-col"></td>
        <td class="total-aging-col"></td>
      </tr>
      <tr>
        <td class="total-queue-label" colspan="2">Total Queue</td>
        <td class="total-queue-cell"></td>
        <td class="total-queue-cell"></td>
        <td class="total-queue-cell"></td>
        <td class="total-queue-cell"></td>
        <td class="total-aging-col"></td>
      </tr>
    </table>
  `;
}
</script>
</body>
</html>
